name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build (Mac Catalyst) & Test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 11 Preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'
          include-prerelease: true

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Mac Catalyst)
        run: dotnet build -f net11.0-maccatalyst -c Release --no-restore

      - name: Run tests
        run: dotnet test tests/PartsCopilot.Tests/ -c Release --no-restore --verbosity normal

  build-android:
    name: Build (Android)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 11 Preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'
          include-prerelease: true

      - name: Install MAUI and Android workloads
        run: dotnet workload install maui-android

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Android)
        run: dotnet build -f net11.0-android -c Release --no-restore
